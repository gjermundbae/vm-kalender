<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VM-kalenderen</title>
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>
    <header class="app-header no-print">
      <h1 class="app-title">VM-kalenderen</h1>
      <div class="controls">
        <div class="controls-actions">
          <div class="btn-group">
            <span class="btn-hint" id="hint-poster">
              <button
                type="button"
                class="btn-download btn-download--secondary"
                id="btn-poster"
                disabled
              >
                Lag VM-plakat
              </button>
            </span>
            <span class="btn-hint" id="hint-download">
              <button
                type="button"
                class="btn-download btn-download--secondary"
                id="btn-download"
                disabled
              >
                Legg til i kalender
              </button>
            </span>
          </div>
        </div>
        <div class="controls-toolbar">
          <div class="controls-cluster">
            <div class="controls-row">
              <div class="sort-toggle view-toggle" role="group" aria-label="Velg visning">
                <button
                  type="button"
                  class="sort-toggle__btn is-active"
                  data-view="list"
                  aria-pressed="true"
                >
                  Liste
                </button>
                <button
                  type="button"
                  class="sort-toggle__btn"
                  data-view="bracket"
                  aria-pressed="false"
                >
                  Tre
                </button>
              </div>
              <div class="select-toggle" role="group" aria-label="Velg alle kamper">
                <button
                  type="button"
                  class="select-toggle__btn"
                  id="btn-select-all"
                  aria-pressed="false"
                >
                  Velg alle
                </button>
              </div>
            </div>
            <div class="list-controls">
              <div class="sort-toggle" role="group" aria-label="Sorter kamper">
                <button
                  type="button"
                  class="sort-toggle__btn is-active"
                  data-sort="time"
                  aria-pressed="true"
                >
                  Tid
                </button>
                <button
                  type="button"
                  class="sort-toggle__btn"
                  data-sort="group"
                  aria-pressed="false"
                >
                  Gruppe
                </button>
              </div>
              <div class="past-toggle" role="group" aria-label="Spilte kamper">
                <button
                  type="button"
                  class="past-toggle__btn"
                  id="btn-toggle-past"
                  aria-pressed="false"
                  hidden
                >
                  Vis spilte
                </button>
              </div>
            </div>
          </div>
          <p class="selection-count" id="selection-count" hidden>
            <span id="selection-count-num">0</span> kamper valgt
          </p>
        </div>
      </div>
    </header>

    <main class="app-main no-print">
      <section id="match-list" class="match-list" aria-label="Kamper"></section>
      <section id="bracket-view" class="bracket" aria-label="Sluttspilltre" hidden>
        <p class="bracket__narrow-note">
          Sluttspilltreet vises best på en større skjerm – bruk liste-visningen på mobil.
        </p>
        <div id="bracket-host" class="bracket__host"></div>
      </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/render.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/poster.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
